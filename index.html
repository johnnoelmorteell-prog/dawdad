<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Valentine 💖</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;}

body{
 font-family:Arial, sans-serif;
 height:100vh;
 background:linear-gradient(135deg,#ff9ecf,#ffd6e7);
 display:flex;
 justify-content:center;
 align-items:center;
 overflow:hidden;
}

/* INTRO SCREEN */
#intro{
 position:fixed;
 inset:0;
 background:black;
 color:white;
 display:flex;
 flex-direction:column;
 justify-content:center;
 align-items:center;
 z-index:999;
 transition:1s;
}

#intro h1{
 font-size:32px;
 margin-bottom:20px;
}

/* CARD */
.card{
 background:white;
 padding:25px;
 border-radius:25px;
 width:90%;
 max-width:380px;
 text-align:center;
 box-shadow:0 20px 40px rgba(0,0,0,.2);
 position:relative;
}

img{
 width:100%;
 border-radius:15px;
 margin-bottom:10px;
}

h1{ color:#ff4f8b; }

p{
 margin:15px 0;
 font-size:18px;
 min-height:40px;
}

/* BUTTONS */
.btn{
 border:none;
 padding:12px 26px;
 border-radius:30px;
 font-size:18px;
 cursor:pointer;
 transition:.2s;
}

#yesBtn{
 background:#ff4f8b;
 color:white;
}

#noBtn{
 background:#ddd;
 position:absolute;
}

/* LOVE METER */
#meterBox{
 width:100%;
 height:12px;
 background:#eee;
 border-radius:10px;
 margin-top:10px;
 overflow:hidden;
}

#meter{
 height:100%;
 width:0%;
 background:#ff4f8b;
 transition:.4s;
}

/* FLOATING */
.float{
 position:absolute;
 animation:floatUp linear forwards;
}

@keyframes floatUp{
 from{transform:translateY(110vh);}
 to{transform:translateY(-10vh);opacity:0;}
}
</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
 <h1>💖 Tap to Begin 💖</h1>
 <p>Special message waiting...</p>
</div>

<audio id="bgm" loop>
 <source src="tenerife_sea.mp3" type="audio/mpeg">
</audio>

<div class="card" id="card">

<img id="gif" src="https://media.giphy.com/media/dFYPRY6u3YnajI1jP3/giphy.gif">

<h1>Angel Lyka L. Opulencia💖</h1>

<p id="question"></p>

<div id="meterBox">
 <div id="meter"></div>
</div>

<br>

<button id="yesBtn" class="btn">Yes</button>
<button id="noBtn" class="btn">No</button>

</div>

<script>

/* ========= INTRO + MUSIC ========= */
const intro=document.getElementById("intro");
const bgm=document.getElementById("bgm");

intro.onclick=()=>{
 intro.style.opacity=0;
 setTimeout(()=>intro.remove(),1000);

 bgm.volume=0;
 bgm.play();

 let v=0;
 const fade=setInterval(()=>{
  v+=0.05;
  bgm.volume=v;
  if(v>=0.7) clearInterval(fade);
 },200);
};

/* ========= MULTI STEP ========= */
const questions=[
 "Will you be my Valentine? 🥺",
 "Are you really really sure? 💖",
 "Like forever Valentine? 🌸",
 "Forever and ever?? 🫣🫣",
 "Spend a valentines with me?!",
 "Final answer? OH MY GOD!"
];

let step=0;

const qEl=document.getElementById("question");
const meter=document.getElementById("meter");

function updateStep(){
 qEl.textContent=questions[step];
 meter.style.width=((step+1)/questions.length*100)+"%";
}
updateStep();

/* ========= BUTTONS ========= */
const yesBtn=document.getElementById("yesBtn");
const noBtn=document.getElementById("noBtn");
const card=document.getElementById("card");

yesBtn.onclick=()=>{
 if(step<questions.length-1){
  step++;
  updateStep();
 }else{
  finalYes();
 }
};

/* ========= RUNAWAY NO BUTTON ========= */
noBtn.onmouseover=()=>{
 const x=Math.random()*250-125;
 const y=Math.random()*150-75;
 noBtn.style.transform=`translate(${x}px,${y}px)`;
};

/* ========= FINAL YES ========= */
function finalYes(){
 card.innerHTML=`
 <img src="https://media.giphy.com/media/11sBLVxNs7v6WA/giphy.gif">
 <h1>YESSSS?!!💖</h1>
 <p>You made me the happiest person alive 🥰</p>
 `;
 confetti();
}

/* ========= CONFETTI ========= */
function confetti(){
 for(let i=0;i<60;i++){
  spawn();
 }
}

function spawn(){
 const el=document.createElement("div");
 el.className="float";
 el.innerText=Math.random()<.5?"💖":"🌸";
 el.style.left=Math.random()*100+"vw";
 el.style.fontSize=(20+Math.random()*30)+"px";
 el.style.animationDuration=(4+Math.random()*3)+"s";
 document.body.appendChild(el);
 setTimeout(()=>el.remove(),8000);
}

setInterval(spawn,700);

</script>
</body>
</html>
